version: "3.9"

# ============================================================
# Forge AI Workflow Studio — Local Development Stack
# ============================================================
# Usage:
#   docker compose up          → start all services
#   docker compose up db redis → start only data layer
#   docker compose down -v     → stop + remove volumes
#
# The web and api services can also be run with pnpm dev / uv run
# for hot-reload. In that case, start only: db, redis, temporal
# ============================================================

services:
  # ----------------------------------------------------------
  # PostgreSQL 15 + pgvector
  # ----------------------------------------------------------
  db:
    image: pgvector/pgvector:pg15
    container_name: forge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge_dev_password
      POSTGRES_DB: forge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------
  # Redis 7 — cache + pub/sub for streaming
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: forge-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ----------------------------------------------------------
  # FastAPI backend
  # ----------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: forge-api
    restart: unless-stopped
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      REDIS_URL: redis://redis:6379
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      CORS_ORIGINS: '["http://localhost:3000"]'
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api:/workspace
    working_dir: /workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Next.js frontend
  # ----------------------------------------------------------
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      target: dev
    container_name: forge-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ../apps/web:/workspace
      - web_node_modules:/workspace/node_modules
    working_dir: /workspace

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
