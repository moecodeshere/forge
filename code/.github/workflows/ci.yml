name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
# Job 1: Web — ESLint + TypeCheck + Vitest
# ============================================================
jobs:
  web-ci:
    name: "Web (lint · typecheck · test)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-schemas
        run: pnpm --filter @forge/shared-schemas build

      - name: ESLint
        run: pnpm --filter @forge/web lint

      - name: TypeCheck
        run: pnpm --filter @forge/web typecheck

      - name: Unit tests (Vitest)
        run: pnpm --filter @forge/web test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          flags: web
          files: apps/web/coverage/coverage-final.json
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================
  # Job 2: API — ruff + mypy + pytest
  # ============================================================
  api-ci:
    name: "API (ruff · mypy · pytest)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies (with dev group)
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy app/

      - name: Unit + integration tests (pytest)
        run: uv run pytest tests/ -v
        env:
          ENVIRONMENT: test
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          flags: api
          files: apps/api/coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================
  # Job 3: E2E — Playwright (runs after both CI jobs pass)
  # ============================================================
  e2e:
    name: "E2E (Playwright)"
    runs-on: ubuntu-latest
    needs: [web-ci, api-ci]
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @forge/web exec playwright install --with-deps chromium

      - name: Build
        run: pnpm --filter @forge/shared-schemas build && pnpm --filter @forge/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Run E2E tests
        run: pnpm --filter @forge/web test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ============================================================
  # Job 4: Docker build smoke test
  # ============================================================
  docker-build:
    name: "Docker build (smoke)"
    runs-on: ubuntu-latest
    needs: [web-ci, api-ci]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t forge-api:ci .

      - name: Build Web image
        run: docker build -f docker/Dockerfile.web -t forge-web:ci .
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Smoke test API container
        run: |
          docker run -d --name forge-api-test -p 8000:8000 forge-api:ci
          sleep 5
          curl --fail http://localhost:8000/healthz
          docker stop forge-api-test
